<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- ears -->
  <ellipse cx="18" cy="20" rx="9" ry="13" fill="#c084fc" transform="rotate(-15 18 20)"/>
  <ellipse cx="46" cy="20" rx="9" ry="13" fill="#c084fc" transform="rotate(15 46 20)"/>
  <ellipse cx="18" cy="21" rx="5" ry="9" fill="#f0abfc" transform="rotate(-15 18 21)"/>
  <ellipse cx="46" cy="21" rx="5" ry="9" fill="#f0abfc" transform="rotate(15 46 21)"/>
  <!-- head -->
  <ellipse cx="32" cy="36" rx="22" ry="20" fill="#e9d5ff"/>
  <!-- snout -->
  <ellipse cx="32" cy="43" rx="11" ry="8" fill="#f5d0fe"/>
  <!-- nose -->
  <ellipse cx="32" cy="39" rx="5" ry="3.5" fill="#581c87"/>
  <!-- nostrils -->
  <ellipse cx="30" cy="39.5" rx="1.2" ry="0.8" fill="#3b0764"/>
  <ellipse cx="34" cy="39.5" rx="1.2" ry="0.8" fill="#3b0764"/>
  <!-- mouth -->
  <path d="M27 44 Q32 49 37 44" fill="none" stroke="#9333ea" stroke-width="1.5" stroke-linecap="round"/>
  <!-- eyes -->
  <ellipse cx="23" cy="31" rx="5" ry="5.5" fill="white"/>
  <ellipse cx="41" cy="31" rx="5" ry="5.5" fill="white"/>
  <ellipse cx="24" cy="32" rx="3" ry="3.5" fill="#1e1b4b"/>
  <ellipse cx="42" cy="32" rx="3" ry="3.5" fill="#1e1b4b"/>
  <!-- eye shine -->
  <circle cx="25.5" cy="30.5" r="1.2" fill="white"/>
  <circle cx="43.5" cy="30.5" r="1.2" fill="white"/>
  <!-- eyebrows -->
  <path d="M19 26 Q23 23 27 25" fill="none" stroke="#7e22ce" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M37 25 Q41 23 45 26" fill="none" stroke="#7e22ce" stroke-width="1.8" stroke-linecap="round"/>
</svg>
