services:
  - type: web
    name: y2obi
    runtime: python
    buildCommand: >-
      pip install -r requirements-web.txt &&
      mkdir -p $HOME/bgutil &&
      curl -L https://github.com/Brainicism/bgutil-ytdlp-pot-provider/archive/refs/tags/1.3.1.tar.gz | tar -xz -C $HOME/bgutil --strip-components=1 &&
      cd $HOME/bgutil/server && npm ci && npx tsc
    startCommand: gunicorn web.app:app --workers 1 --timeout 300 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: COOKIES_B64
        sync: false
      - key: DOWNLOAD_DIR
        value: /tmp/y2obi-web
