services:
  - type: web
    name: y2obi
    runtime: python
    buildCommand: pip install -r requirements-web.txt
    startCommand: gunicorn web.app:app --workers 1 --timeout 300 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: COOKIES_B64
        sync: false
      - key: DOWNLOAD_DIR
        value: /tmp/y2obi-web

